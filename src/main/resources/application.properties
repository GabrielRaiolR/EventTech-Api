spring.application.name=api

# Banco PostgreSQL — use variáveis de ambiente (nunca commite senhas).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventostec}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# AWS — Variáveis de ambiente da AWS
aws.region=${AWS_REGION:us-east-1}
aws.bucket.name=${AWS_S3_BUCKET}
